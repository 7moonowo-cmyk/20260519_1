<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberRPS - 賽博猜拳傳輸系統</title>
    <!-- 外部函式庫 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
      :root {
        --neon-cyan: #00f3ff;
        --neon-pink: #ff00ff;
        --bg-dark: #0a0a12;
      }
      body {
        margin: 0;
        background-color: var(--bg-dark);
        color: white;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      /* 掃描線特效 */
      body::after {
        content: " ";
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
        z-index: 100;
      }
      #main-container {
        position: relative;
        width: 90vw;
        height: 80vh;
        border: 4px solid var(--neon-cyan);
        box-shadow: 0 0 20px var(--neon-cyan);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.8);
      }
      #video-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }
      video {
        max-width: 80%;
        max-height: 80%;
        border: 2px solid var(--neon-pink);
        object-fit: contain;
        transform: scaleX(-1);
      }
      #ui-overlay {
        position: absolute;
        bottom: 20px;
        text-align: center;
        width: 100%;
        z-index: 10;
      }
      #status-msg {
        font-size: 24px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--neon-cyan);
        text-shadow: 0 0 10px var(--neon-cyan);
      }
      #ai-hand {
        position: absolute;
        top: 20px;
        width: 100%;
        font-size: 80px;
        text-align: center;
        text-shadow: 0 0 20px var(--neon-cyan);
      }
      #qrcode-container {
        background: white;
        padding: 10px;
        display: inline-block;
        border-radius: 5px;
      }
      .setup-screen {
        text-align: center;
        padding: 20px;
        background: rgba(0,0,0,0.8);
        border: 1px solid var(--neon-pink);
      }
      #countdown {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 100px;
        color: var(--neon-pink);
        text-shadow: 0 0 30px var(--neon-pink);
        z-index: 20;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="main-container">
      <!-- 初始連接畫面 -->
      <div id="setup-screen" class="setup-screen">
        <h2 style="color: var(--neon-cyan); margin-top:0;">LINK_START.exe</h2>
        <div id="qrcode-container"></div>
        <p style="font-size: 12px; color: var(--neon-pink);">請用手機掃描 QR CODE 以連結同步</p>
      </div>
      <!-- 遊戲畫面 -->
      <div id="game-screen" style="display:none; width:100%; height:100%;">
        <div id="countdown"></div>
        <div id="ai-hand">🤖</div>
        <div id="video-wrapper">
          <video id="remote-video" autoplay playsinline></video>
        </div>
        <div id="ui-overlay">
          <div id="status-msg">等待手勢辨識中...</div>
        </div>
      </div>
    </div>
    <script src="sketch.js"></script>
  </body>
</html>
